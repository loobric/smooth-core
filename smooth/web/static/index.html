<!DOCTYPE html>
<!--
  Smooth web inbox (smooth-core#6).
  Deliberately one static file: no build step, no dependencies, served by
  the core container. Scope (decision G2 + field feedback): read views for
  tools/machines/audit, plus housekeeping write actions — confirm/reject,
  bind/unbind, create-record, and delete of records/machines/entries.
  Anything richer belongs to Smooth Web (commercial).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smooth</title>
<style>
  :root { --bg:#10151a; --card:#1a222b; --ink:#e8edf2; --dim:#8fa1b3;
          --line:#2a3641; --ok:#3fb46a; --warn:#d9923b; --bad:#cf5b56; --link:#5ab3d6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.45 system-ui,-apple-system,sans-serif; }
  header { display:flex; align-items:center; gap:.75rem; padding:.7rem 1rem;
           background:var(--card); border-bottom:1px solid var(--line);
           position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  header h1 { font-size:1.1rem; margin:0 .5rem 0 0; }
  nav { display:flex; gap:.25rem; flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--dim);
               padding:.5rem .8rem; border-radius:8px; font-size:.95rem; cursor:pointer; }
  nav button.active { color:var(--ink); border-color:var(--line); background:var(--bg); }
  nav button .n { background:var(--warn); color:#000; border-radius:9px;
                  padding:0 .45em; font-size:.8em; margin-left:.3em; }
  main { max-width:760px; margin:0 auto; padding:1rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:.9rem 1rem; margin-bottom:.8rem; }
  .muted { color:var(--dim); font-size:.9rem; }
  .row { display:flex; justify-content:space-between; gap:.6rem; align-items:baseline; flex-wrap:wrap; }
  .id { font-family:ui-monospace,monospace; font-size:.8rem; color:var(--dim); }
  .vs { text-align:center; color:var(--dim); margin:.4rem 0; font-size:.9rem; }
  .conf { height:6px; background:var(--line); border-radius:3px; margin:.6rem 0 .3rem; }
  .conf > div { height:100%; border-radius:3px; background:var(--warn); }
  .actions { display:flex; gap:.6rem; margin-top:.7rem; }
  .actions button { flex:1; min-height:46px; border:none; border-radius:10px;
                    font-size:1rem; font-weight:600; cursor:pointer; }
  .confirm { background:var(--ok); color:#06210f; }
  .reject  { background:var(--bad); color:#2b0c0a; }
  .unbind  { background:none; border:1px solid var(--bad) !important; color:var(--bad);
             min-height:36px !important; font-weight:500 !important; flex:0 0 auto !important;
             padding:0 .8rem; }
  .trow { display:flex; justify-content:space-between; gap:.6rem; align-items:center;
          flex-wrap:wrap; padding:.5rem 0; border-top:1px solid var(--line); }
  .trow:first-of-type { border-top:none; }
  .tinfo { display:flex; gap:.5rem; align-items:baseline; flex-wrap:wrap; min-width:0; }
  .tnum { font-weight:600; }
  .rowact { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
  .rowact button { min-height:34px; border:none; border-radius:8px; padding:0 .7rem;
                   font-size:.85rem; font-weight:600; cursor:pointer; }
  button.mini.confirm { background:var(--ok); color:#06210f; }
  button.mini.reject  { background:var(--bad); color:#2b0c0a; }
  button.mini.link    { background:none; border:1px solid var(--link); color:var(--link); }
  button.mini.create  { background:none; border:1px solid var(--ok); color:var(--ok); }
  button.mini.del     { background:none; border:1px solid var(--bad); color:var(--bad); }
  .suggest { font-size:.82rem; margin-right:.2rem; }
  .picker { background:var(--bg); border:1px solid var(--line); color:var(--ink);
            border-radius:8px; padding:.4rem; font-size:.85rem; max-width:50vw; }
  .explain { background:#15202b; border:1px solid var(--line); border-radius:12px;
             padding:.8rem 1rem; margin-bottom:1rem; font-size:.92rem; color:var(--dim); }
  .explain b { color:var(--ink); }
  .empty { text-align:center; color:var(--dim); padding:3rem 1rem; }
  .pill { font-size:.78rem; padding:.1em .55em; border-radius:9px; border:1px solid var(--line); }
  .pill.bound { color:var(--ok); border-color:var(--ok); }
  .pill.unbound { color:var(--dim); }
  .pill.dupe { color:var(--warn); border-color:var(--warn); }
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  td, th { text-align:left; padding:.35rem .4rem; border-top:1px solid var(--line); }
  th { color:var(--dim); font-weight:500; border-top:none; }
  #login { position:fixed; inset:0; background:var(--bg); display:none;
           align-items:center; justify-content:center; z-index:10; }
  #login form { background:var(--card); border:1px solid var(--line); border-radius:14px;
                padding:1.5rem; width:min(92vw,340px); display:flex; flex-direction:column; gap:.7rem; }
  #login input { background:var(--bg); border:1px solid var(--line); color:var(--ink);
                 border-radius:8px; padding:.7rem; font-size:1rem; }
  #login button { min-height:46px; border:none; border-radius:10px; background:var(--link);
                  color:#06212b; font-size:1rem; font-weight:600; cursor:pointer; }
  #login .err { color:var(--bad); font-size:.9rem; min-height:1.2em; }
  #toast { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
           background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:.6rem 1rem; opacity:0; transition:opacity .25s; max-width:92vw; }
  .spacer { flex:1; }
  #whoami { font-size:.8rem; }
</style>
</head>
<body>

<header>
  <h1>Smooth</h1>
  <nav id="tabs"></nav>
  <span class="spacer"></span>
  <span id="whoami" class="muted"></span>
</header>

<main id="view"></main>

<div id="login"><form onsubmit="return doLogin(event)">
  <strong>Sign in to Smooth</strong>
  <input id="email" type="email" placeholder="email" autocomplete="username" required>
  <input id="password" type="password" placeholder="password" autocomplete="current-password" required>
  <div class="err" id="loginerr"></div>
  <button type="submit">Sign in</button>
</form></div>

<div id="toast"></div>

<script>
"use strict";
const TABS = [["inbox","Inbox"],["tools","Tools"],["toolsets","Tool Sets"],["machines","Machines"],["audit","Audit"]];
let state = { tab:"inbox", inbox:[], tools:[], toolsets:[], machines:[], audit:[],
              machineNames:{}, toolNames:{}, entriesByMachine:{}, proposalByEntry:{},
              linkTarget:null };

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2600);
}

async function api(method, path, body) {
  const r = await fetch("/api/v1" + path, {
    method, credentials: "same-origin",
    headers: body ? {"Content-Type": "application/json"} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (r.status === 401) { $("#login").style.display = "flex"; throw new Error("auth"); }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || ("HTTP " + r.status));
  return data;
}

async function doLogin(ev) {
  ev.preventDefault();
  try {
    await api("POST", "/auth/login", {email: $("#email").value, password: $("#password").value});
    $("#login").style.display = "none";
    refresh();
  } catch (e) { $("#loginerr").textContent = "Sign-in failed - check credentials."; }
  return false;
}

async function refresh() {
  try {
    const [inbox, tools, toolsets, machines, audit] = await Promise.all([
      api("GET", "/inbox"), api("GET", "/tool-records"),
      api("GET", "/tool-sets"),
      api("GET", "/machines"), api("GET", "/audit-logs?limit=50"),
    ]);
    state.inbox = inbox.items; state.tools = tools.items;
    state.toolsets = toolsets.items;
    state.machines = machines.items; state.audit = audit.logs || [];
    state.machineNames = Object.fromEntries(state.machines.map(m => [m.id, m.name]));
    state.toolNames = Object.fromEntries(state.tools.map(t => [t.id, t.name]));
    state.proposalByEntry = Object.fromEntries(inbox.items.map(i => [i.entry.id, i]));
    // Tool tables feed both the Machines tab and the derived Inbox, so load
    // them all here rather than lazily per-tab.
    const tables = await Promise.all(state.machines.map(m =>
      api("GET", `/machines/${m.id}/tool-table`)
        .then(t => [m.id, t.items]).catch(() => [m.id, []])));
    state.entriesByMachine = Object.fromEntries(tables);
    $("#whoami").textContent = "";
    render();
  } catch (e) { if (e.message !== "auth") toast("Load failed: " + e.message); }
}

// Every unbound entry across all machines — the work the inbox surfaces.
function unboundEntries() {
  const out = [];
  for (const m of state.machines)
    for (const e of (state.entriesByMachine[m.id] || []))
      if (!e.tool_record_id) out.push({entry: e, machine: m});
  return out;
}

// The action that fits one entry's state: unbind when bound; confirm/reject
// when a heuristic suggestion is open; link/create when it's an orphan.
function actionControls(machineId, entry) {
  if (entry.tool_record_id)
    return `<button class="unbind" onclick="unbind('${machineId}',${entry.tool_number})">Unbind</button>`;
  const linking = state.linkTarget &&
    state.linkTarget.machineId === machineId &&
    state.linkTarget.toolNumber === entry.tool_number;
  if (linking) {
    const opts = state.tools.map(t =>
      `<option value="${t.id}">${esc(t.name)} (${esc(t.id.slice(0,8))})</option>`).join("");
    return `<select id="recpick" class="picker">${opts}</select>
      <button class="mini confirm" onclick="confirmLink('${machineId}',${entry.tool_number})">Link</button>
      <button class="mini reject" onclick="cancelLink()">Cancel</button>`;
  }
  const prop = state.proposalByEntry[entry.id];
  if (prop)
    return `<span class="suggest muted">suggests <b>${esc(prop.proposed_record.name)}</b>` +
      ` &middot; ${Math.round(prop.confidence*100)}%</span>` +
      `<button class="mini confirm" onclick="resolve('${prop.id}','confirm')">Same tool</button>
       <button class="mini reject" onclick="resolve('${prop.id}','reject')">Different</button>
       <button class="mini link" onclick="startLink('${machineId}',${entry.tool_number})">Link&hellip;</button>`;
  return `<button class="mini link" onclick="startLink('${machineId}',${entry.tool_number})">Link to record&hellip;</button>
    <button class="mini create" onclick="createRecord('${machineId}',${entry.tool_number})">Create record</button>`;
}

function startLink(machineId, toolNumber) {
  if (!state.tools.length) { toast("No tool records yet - use Create record."); return; }
  state.linkTarget = {machineId, toolNumber}; render();
}
function cancelLink() { state.linkTarget = null; render(); }

async function confirmLink(machineId, toolNumber) {
  const sel = document.getElementById("recpick");
  if (!sel || !sel.value) return;
  try {
    await api("POST", `/machines/${machineId}/tool-table/${toolNumber}/bind`,
      {tool_record_id: sel.value});
    state.linkTarget = null;
    toast(`Linked T${toolNumber}. Nothing was overwritten.`);
    refresh();
  } catch (e) { toast(e.message); }
}

async function createRecord(machineId, toolNumber) {
  const e = (state.entriesByMachine[machineId] || []).find(x => x.tool_number === toolNumber);
  const name = window.prompt("Name for the new record:", (e && e.description) || "");
  if (name === null) return;  // cancelled
  try {
    const body = name.trim() ? {name: name.trim()} : undefined;
    await api("POST", `/machines/${machineId}/tool-table/${toolNumber}/create-record`, body);
    toast(`Created record and linked T${toolNumber}.`);
    refresh();
  } catch (e) { toast(e.message); }
}

function geomSummary(g) {
  if (!g) return "";
  const bits = [];
  if (g.shape) bits.push(g.shape);
  if (g.diameter) bits.push("⌀" + g.diameter + (g.diameter_unit || ""));
  if (g.flutes) bits.push(g.flutes + "fl");
  return bits.join(" · ");
}

function render() {
  const needs = unboundEntries().length;
  $("#tabs").innerHTML = TABS.map(([id, label]) =>
    `<button class="${state.tab===id?"active":""}" onclick="setTab('${id}')">${label}` +
    (id==="inbox" && needs ? `<span class="n">${needs}</span>` : "") +
    `</button>`).join("");
  const v = {inbox: renderInbox, tools: renderTools, toolsets: renderToolSets, machines: renderMachines, audit: renderAudit}[state.tab];
  $("#view").innerHTML = v();
}
function setTab(t) { state.tab = t; render(); }

// ---- Inbox -----------------------------------------------------------------

function renderInbox() {
  const items = unboundEntries();
  if (!items.length)
    return `<div class="empty">Nothing needs you.<br>
            <span class="muted">Every tool your machines reported is linked to a record.</span></div>`;
  return `
  <div class="explain">These are <b>tools your machines reported that aren't yet linked to a
  record</b> &mdash; the same rows you'll find on each machine, gathered here. Linking
  <b>overwrites nothing on either side</b>. Where the server has a guess, <b>Same tool</b> links them
  and <b>Different</b> drops that guess. Otherwise <b>Link</b> to an existing record or <b>Create</b>
  a new one. Nothing here is a one-way door: a link can be undone with Unbind, and a dropped guess
  can always be linked by hand later.</div>` +
  items.map(({entry, machine}) => {
    const prop = state.proposalByEntry[entry.id];
    return `
  <div class="card">
    <div class="row">
      <strong>${esc(machine.name)} &middot; T${entry.tool_number}</strong>
      <span class="id">${esc(entry.id.slice(0,8))}</span>
    </div>
    <div class="muted">${esc(entry.description || "no description")}` +
      `${entry.offsets && entry.offsets.diameter ? " &middot; &#x2300;" + entry.offsets.diameter : ""}</div>` +
    (prop ? `<div class="vs">is this the same tool as <b>${esc(prop.proposed_record.name)}</b>?</div>
    <div class="conf"><div style="width:${Math.round(prop.confidence*100)}%"></div></div>
    <div class="muted">${Math.round(prop.confidence*100)}% &middot; ${esc(prop.reason)}</div>` : "") +
    `<div class="rowact" style="margin-top:.7rem">${actionControls(machine.id, entry)}</div>
  </div>`;
  }).join("");
}

async function resolve(id, action) {
  try {
    const item = await api("POST", `/inbox/${id}/${action}`);
    toast(action === "confirm"
      ? `Linked T${item.entry.tool_number} ↔ ${item.proposed_record.name}. Nothing was overwritten.`
      : `Dismissed - won't be suggested again.`);
    refresh();
  } catch (e) { toast(e.message); }
}

// ---- Tools -------------------------------------------------------------------

function renderTools() {
  if (!state.tools.length)
    return `<div class="empty">No tool records yet.<br><span class="muted">Create them via the API or CLI; importers arrive in M2.</span></div>`;
  const counts = {};
  state.tools.forEach(t => counts[t.name] = (counts[t.name] || 0) + 1);
  return state.tools.map(t => `
  <div class="card">
    <div class="row">
      <strong>${esc(t.name)}</strong>
      <span>${counts[t.name] > 1 ? '<span class="pill dupe">duplicate name</span> ' : ""}
            <span class="id">${esc(t.id.slice(0,8))}</span></span>
    </div>
    <div class="muted">${esc(geomSummary(t.geometry))}
      ${t.tags?.length ? " &middot; " + t.tags.map(esc).join(", ") : ""}</div>
    ${t.machines.map(m => `
      <div class="row" style="margin-top:.5rem">
        <span><span class="pill bound">bound</span>
          T${m.tool_number} @ ${esc(state.machineNames[m.machine_id] || m.machine_id.slice(0,8))}</span>
        <button class="unbind actions" onclick="unbind('${m.machine_id}',${m.tool_number})">Unbind</button>
      </div>`).join("")}
    <div class="row" style="margin-top:.6rem">
      <span class="muted">${t.machines.length} machine link(s)</span>
      <button class="unbind actions" onclick="deleteRecord('${t.id}')">Delete record</button>
    </div>
  </div>`).join("");
}

async function deleteRecord(id) {
  const t = state.tools.find(x => x.id === id);
  const name = t ? t.name : id.slice(0, 8);
  const links = t ? t.machines.length : 0;
  const warn = links
    ? `Delete record "${name}"? ${links} machine entr${links > 1 ? "ies" : "y"} will be unbound — their data stays on the machine, only the link dies.`
    : `Delete record "${name}"?`;
  if (!window.confirm(warn)) return;
  try {
    const r = await api("DELETE", "/tool-records", {ids: [id]});
    toast(r.errors?.length ? r.errors[0].message : `Deleted "${name}".`);
    refresh();
  } catch (e) { toast(e.message); }
}

async function unbind(machineId, toolNumber) {
  const name = state.machineNames[machineId] || "machine";
  if (!window.confirm(`Unbind T${toolNumber} @ ${name}? The entry keeps its data and becomes eligible for new suggestions.`)) return;
  try {
    await api("POST", `/machines/${machineId}/tool-table/${toolNumber}/unbind`);
    toast(`T${toolNumber} unbound - data untouched.`);
    refresh();
  } catch (e) { toast(e.message); }
}

// ---- Tool Sets -------------------------------------------------------------

function sourceFile(extra) {
  // Clients namespace their passthrough data; surface any recorded filename
  // without privileging a particular client.
  for (const v of Object.values(extra || {}))
    if (v && typeof v === "object" && v.filename) return v.filename;
  return null;
}

function renderToolSets() {
  if (!state.toolsets.length)
    return `<div class="empty">No tool sets yet.<br><span class="muted">They arrive when a client publishes a collection of tools.</span></div>`;
  const counts = {};
  state.toolsets.forEach(s => counts[s.name] = (counts[s.name] || 0) + 1);
  const toolName = Object.fromEntries(state.tools.map(t => [t.id, t.name]));
  return state.toolsets.map(s => `
  <div class="card">
    <div class="row">
      <strong>${esc(s.name)}</strong>
      <span>${counts[s.name] > 1 ? '<span class="pill dupe">duplicate name</span> ' : ""}
            <span class="id">${esc(s.id.slice(0,8))}</span></span>
    </div>
    <div class="muted">${s.tool_record_ids.length} tool(s)
      ${sourceFile(s.extra) ? " &middot; from " + esc(sourceFile(s.extra)) : ""}</div>
    <div class="muted" style="margin-top:.3rem">${
      s.tool_record_ids.slice(0, 12).map(id => esc(toolName[id] || id.slice(0,8))).join(", ")
    }${s.tool_record_ids.length > 12 ? " …" : ""}</div>
    <div class="row" style="margin-top:.6rem">
      <span class="muted">updated ${esc((s.updated_at || "").slice(0,16).replace("T"," "))}</span>
      <button class="unbind actions" onclick="deleteToolSet('${s.id}', '${esc(s.name)}')">Delete</button>
    </div>
  </div>`).join("");
}

async function deleteToolSet(id, name) {
  if (!window.confirm(`Delete tool set "${name}" (${id.slice(0,8)})? Its tool records are NOT deleted - only the collection.`)) return;
  try {
    const r = await api("DELETE", "/tool-sets", {ids: [id]});
    toast(r.errors?.length ? r.errors[0].message : `Deleted "${name}". Tool records untouched.`);
    refresh();
  } catch (e) { toast(e.message); }
}

// ---- Machines ------------------------------------------------------------------

function entryRow(machineId, e) {
  const bound = !!e.tool_record_id;
  const recName = bound ? (state.toolNames[e.tool_record_id] || e.tool_record_id.slice(0,8)) : "";
  const dia = e.offsets && e.offsets.diameter ? "&#x2300;" + e.offsets.diameter : "";
  return `<div class="trow">
    <div class="tinfo">
      <span class="tnum">T${e.tool_number}</span>
      <span>${esc(e.description || "—")}</span>
      <span class="muted">${dia}</span>
      ${bound
        ? `<span class="pill bound">${esc(recName)}</span>`
        : `<span class="pill unbound">unbound</span>`}
    </div>
    <div class="rowact">${actionControls(machineId, e)}
      <button class="mini del" title="Remove this reported entry" onclick="deleteEntry('${machineId}',${e.tool_number})">Remove</button>
    </div>
  </div>`;
}

async function deleteEntry(machineId, toolNumber) {
  const mname = state.machineNames[machineId] || "machine";
  if (!window.confirm(`Remove T${toolNumber} from ${mname}? This deletes what the machine reported for that slot. If the controller pushes again, it comes back.`)) return;
  try {
    const r = await api("DELETE", `/machines/${machineId}/tool-table`, {tool_numbers: [toolNumber]});
    toast(r.errors?.length ? r.errors[0].message : `Removed T${toolNumber} from ${mname}.`);
    refresh();
  } catch (e) { toast(e.message); }
}

function renderMachines() {
  if (!state.machines.length)
    return `<div class="empty">No machines yet.<br><span class="muted">They register themselves on first push from a controller.</span></div>`;
  return state.machines.map(m => {
    const entries = state.entriesByMachine[m.id] || [];
    const body = entries.length
      ? entries.map(e => entryRow(m.id, e)).join("")
      : `<div class="muted">empty tool table</div>`;
    return `
  <div class="card">
    <div class="row">
      <strong>${esc(m.name)}</strong>
      <span class="rowact"><span class="muted">${esc(m.controller_type || "")}</span>
        <button class="mini del" onclick="deleteMachine('${m.id}')">Delete machine</button></span>
    </div>
    ${body}
  </div>`;
  }).join("");
}

async function deleteMachine(id) {
  const name = state.machineNames[id] || "machine";
  const n = (state.entriesByMachine[id] || []).length;
  if (!window.confirm(`Delete machine "${name}" and its ${n} tool-table entr${n === 1 ? "y" : "ies"}? Tool records stay; only this machine and what it reported are removed.`)) return;
  try {
    const r = await api("DELETE", "/machines", {ids: [id]});
    toast(r.errors?.length ? r.errors[0].message : `Deleted machine "${name}".`);
    refresh();
  } catch (e) { toast(e.message); }
}

// ---- Audit -------------------------------------------------------------------

function renderAudit() {
  if (!state.audit.length) return `<div class="empty">No audit entries.</div>`;
  return `<div class="card"><table>
    <tr><th>when</th><th>op</th><th>what</th></tr>
    ${state.audit.map(l => `<tr>
      <td class="muted">${esc((l.timestamp || "").replace("T", " ").slice(0, 16))}</td>
      <td>${esc(l.operation)}</td>
      <td>${esc(l.entity_type)} <span class="id">${esc((l.entity_id || "").slice(0,8))}</span></td>
    </tr>`).join("")}</table></div>`;
}

refresh();
setInterval(() => { if (state.tab === "inbox") refresh(); }, 30000);
</script>
</body>
</html>
