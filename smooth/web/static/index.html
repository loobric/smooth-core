<!DOCTYPE html>
<!--
  Smooth web inbox (smooth-core#6).
  Deliberately one static file: no build step, no dependencies, served by
  the core container. Scope (decision G2 + field feedback): read views for
  tools/machines/audit, plus housekeeping write actions — confirm/reject,
  bind/unbind, create-record, and delete of records/machines/entries.
  Anything richer belongs to Smooth Web (commercial).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smooth</title>
<style>
  :root { --bg:#10151a; --card:#1a222b; --ink:#e8edf2; --dim:#8fa1b3;
          --line:#2a3641; --ok:#3fb46a; --warn:#d9923b; --bad:#cf5b56; --link:#5ab3d6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.45 system-ui,-apple-system,sans-serif; }
  header { display:flex; align-items:center; gap:.75rem; padding:.7rem 1rem;
           background:var(--card); border-bottom:1px solid var(--line);
           position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  header h1 { font-size:1.1rem; margin:0 .5rem 0 0; }
  nav { display:flex; gap:.25rem; flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--dim);
               padding:.5rem .8rem; border-radius:8px; font-size:.95rem; cursor:pointer; }
  nav button.active { color:var(--ink); border-color:var(--line); background:var(--bg); }
  nav button .n { background:var(--warn); color:#000; border-radius:9px;
                  padding:0 .45em; font-size:.8em; margin-left:.3em; }
  main { max-width:760px; margin:0 auto; padding:1rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:.9rem 1rem; margin-bottom:.8rem; }
  .muted { color:var(--dim); font-size:.9rem; }
  .row { display:flex; justify-content:space-between; gap:.6rem; align-items:baseline; flex-wrap:wrap; }
  .id { font-family:ui-monospace,monospace; font-size:.8rem; color:var(--dim); }
  .id.link { color:var(--link); cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px; }
  .id.link:hover { color:var(--ink); text-decoration-style:solid; }
  .vs { text-align:center; color:var(--dim); margin:.4rem 0; font-size:.9rem; }
  .conf { height:6px; background:var(--line); border-radius:3px; margin:.6rem 0 .3rem; }
  .conf > div { height:100%; border-radius:3px; background:var(--warn); }
  .actions { display:flex; gap:.6rem; margin-top:.7rem; }
  .actions button { flex:1; min-height:46px; border:none; border-radius:10px;
                    font-size:1rem; font-weight:600; cursor:pointer; }
  .confirm { background:var(--ok); color:#06210f; }
  .reject  { background:var(--bad); color:#2b0c0a; }
  .unbind  { background:none; border:1px solid var(--bad) !important; color:var(--bad);
             min-height:36px !important; font-weight:500 !important; flex:0 0 auto !important;
             padding:0 .8rem; }
  .trow { display:flex; justify-content:space-between; gap:.6rem; align-items:center;
          flex-wrap:wrap; padding:.5rem 0; border-top:1px solid var(--line); }
  .trow:first-of-type { border-top:none; }
  .tinfo { display:flex; gap:.5rem; align-items:baseline; flex-wrap:wrap; min-width:0; }
  .tnum { font-weight:600; }
  .rowact { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
  .rowact button { min-height:34px; border:none; border-radius:8px; padding:0 .7rem;
                   font-size:.85rem; font-weight:600; cursor:pointer; }
  button.mini.confirm { background:var(--ok); color:#06210f; }
  button.mini.reject  { background:var(--bad); color:#2b0c0a; }
  button.mini.link    { background:none; border:1px solid var(--link); color:var(--link); }
  button.mini.create  { background:none; border:1px solid var(--ok); color:var(--ok); }
  button.mini.del     { background:none; border:1px solid var(--bad); color:var(--bad); }
  .suggest { font-size:.82rem; margin-right:.2rem; }
  .picker { background:var(--bg); border:1px solid var(--line); color:var(--ink);
            border-radius:8px; padding:.4rem; font-size:.85rem; max-width:50vw; }
  .explain { background:#15202b; border:1px solid var(--line); border-radius:12px;
             padding:.8rem 1rem; margin-bottom:1rem; font-size:.92rem; color:var(--dim); }
  .explain b { color:var(--ink); }
  .empty { text-align:center; color:var(--dim); padding:3rem 1rem; }
  .pill { font-size:.78rem; padding:.1em .55em; border-radius:9px; border:1px solid var(--line); }
  .pill.bound { color:var(--ok); border-color:var(--ok); }
  .pill.unbound { color:var(--dim); }
  .pill.dupe { color:var(--warn); border-color:var(--warn); }
  .pill.ok   { color:var(--ok); border-color:var(--ok); }
  .pill.warn { color:var(--warn); border-color:var(--warn); }
  .pill.bad  { color:var(--bad); border-color:var(--bad); }
  .pill.info { color:var(--link); border-color:var(--link); }
  /* provenance badges (catalog drift detector): a claim must READ differently
     from a measurement, and an honest gap from either. */
  .prov { font-size:.72rem; font-family:ui-monospace,monospace; padding:.1em .55em;
          border-radius:9px; border:1px solid var(--line); white-space:nowrap; }
  .prov.asserted { color:var(--warn); border-color:var(--warn); }
  .prov.observed { color:var(--ok);   border-color:var(--ok); }
  .prov.derived  { color:var(--link); border-color:var(--link); }
  .prov.unknown  { color:var(--dim);  border-style:dashed; }
  .frow { display:flex; justify-content:space-between; gap:.6rem; align-items:center;
          flex-wrap:wrap; padding:.45rem 0; border-top:1px solid var(--line); }
  .frow:first-of-type { border-top:none; }
  .flabel { color:var(--dim); flex:0 0 9rem; }
  .fval { flex:1; min-width:6rem; font-weight:600; }
  .unknownval { color:var(--dim); font-style:italic; font-weight:400; }
  .section-h { font-size:.82rem; color:var(--dim); text-transform:uppercase;
               letter-spacing:.05em; margin:1rem 0 .1rem; }
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  td, th { text-align:left; padding:.35rem .4rem; border-top:1px solid var(--line); }
  th { color:var(--dim); font-weight:500; border-top:none; }
  #login { position:fixed; inset:0; background:var(--bg); display:none;
           align-items:center; justify-content:center; z-index:10; }
  #login form { background:var(--card); border:1px solid var(--line); border-radius:14px;
                padding:1.5rem; width:min(92vw,340px); display:flex; flex-direction:column; gap:.7rem; }
  #login input { background:var(--bg); border:1px solid var(--line); color:var(--ink);
                 border-radius:8px; padding:.7rem; font-size:1rem; }
  #login button { min-height:46px; border:none; border-radius:10px; background:var(--link);
                  color:#06212b; font-size:1rem; font-weight:600; cursor:pointer; }
  #login .err { color:var(--bad); font-size:.9rem; min-height:1.2em; }
  #toast { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
           background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:.6rem 1rem; opacity:0; transition:opacity .25s; max-width:92vw; }
  .spacer { flex:1; }
  #whoami { font-size:.8rem; }
  .link-ish { cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px; }
  #detail { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
            align-items:center; justify-content:center; z-index:9; padding:1rem; }
  #detail .sheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
                   padding:1rem; width:min(96vw,720px); max-height:86vh; display:flex; flex-direction:column; }
  #detail pre { overflow:auto; background:var(--bg); border:1px solid var(--line); border-radius:8px;
                padding:.7rem; font-size:.78rem; line-height:1.4; margin:.6rem 0 0;
                white-space:pre-wrap; word-break:break-word; }
  #ask { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
         align-items:center; justify-content:center; z-index:11; padding:1rem; }
  #ask .sheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
                padding:1.1rem; width:min(94vw,420px); }
  #ask #askmsg { font-size:.95rem; }
  #ask input { width:100%; margin-top:.7rem; background:var(--bg); border:1px solid var(--line);
               color:var(--ink); border-radius:8px; padding:.6rem; font-size:1rem; }
  #ask .arow { display:flex; justify-content:flex-end; gap:.5rem; margin-top:.9rem; }
  /* Create-tool-from-catalog form: a separate overlay (not rebuilt by render(),
     so the 15s auto-refresh can't wipe a half-typed name). */
  #ccreate { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
             align-items:center; justify-content:center; z-index:11; padding:1rem; }
  #ccreate .sheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
                    padding:1.1rem; width:min(96vw,520px); max-height:86vh; overflow:auto; }
  #ccreate .cclabel { display:block; color:var(--dim); font-size:.82rem; margin:.6rem 0 .25rem; }
  #ccreate .ccinput { width:100%; background:var(--bg); border:1px solid var(--line);
                      color:var(--ink); border-radius:8px; padding:.6rem; font-size:1rem; }
  #ccreate .arow { display:flex; justify-content:flex-end; gap:.5rem; margin-top:1rem; }
</style>
</head>
<body>

<header>
  <h1>Smooth</h1>
  <nav id="tabs"></nav>
  <span class="spacer"></span>
  <span id="whoami" class="muted"></span>
</header>

<main id="view"></main>

<div id="login"><form onsubmit="return doLogin(event)">
  <strong>Sign in to Smooth</strong>
  <input id="email" type="email" placeholder="email" autocomplete="username" required>
  <input id="password" type="password" placeholder="password" autocomplete="current-password" required>
  <div class="err" id="loginerr"></div>
  <button type="submit">Sign in</button>
</form></div>

<div id="toast"></div>

<div id="detail" onclick="if(event.target.id==='detail')closeDetail()">
  <div class="sheet">
    <div class="row"><strong id="detailtitle"></strong>
      <button class="mini reject" onclick="closeDetail()">Close</button></div>
    <pre id="detailbody"></pre>
  </div>
</div>

<!-- In-page confirm/prompt: native window.confirm/prompt can be permanently
     suppressed by the browser's "prevent additional dialogs" checkbox. -->
<div id="ask" onclick="if(event.target.id==='ask')askCancel()">
  <div class="sheet">
    <div id="askmsg"></div>
    <input id="askinput" onkeydown="if(event.key==='Enter')askOk(); else if(event.key==='Escape')askCancel();">
    <div class="arow">
      <button class="mini reject" onclick="askCancel()">Cancel</button>
      <button class="mini confirm" onclick="askOk()">OK</button>
    </div>
  </div>
</div>

<!-- Create tool from catalog: a pre-populated form (name editable; nominal
     geometry shown read-only with provenance badges). Body is filled by
     openCreateFromCatalog(). No QA/status fields here by design (M2). -->
<div id="ccreate" onclick="if(event.target.id==='ccreate')closeCreate()">
  <div class="sheet">
    <div class="row"><strong>Create tool from catalog</strong>
      <button class="mini reject" onclick="closeCreate()">Cancel</button></div>
    <div id="ccbody"></div>
  </div>
</div>

<script>
"use strict";
// Machines is the ONE binding surface — proposals (the old Inbox) are folded in
// as a "pending review" band/filter on the entries themselves.
const TABS = [["machines","Machines"],["tools","Tools"],["toolsets","Tool Sets"],["catalog","Catalog"],["audit","Audit"]];
let state = { tab:"machines", pendingOnly:false, catalogSel:null, setSel:null, inbox:[], tools:[], toolsets:[], machines:[], audit:[], catalogs:[],
              machineNames:{}, toolNames:{}, entriesByMachine:{}, entriesById:{}, proposalByEntry:{} };

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.style.opacity=1; setTimeout(()=>t.style.opacity=0,2600); }

// In-page confirm/prompt (native dialogs can be permanently suppressed).
let _askResolve=null, _askInput=false;
function _openAsk(message, withInput, def){
  return new Promise(res=>{ _askResolve=res; _askInput=withInput;
    $("#askmsg").textContent=message;
    const inp=$("#askinput"); inp.style.display=withInput?"block":"none";
    if(withInput){ inp.value=def||""; setTimeout(()=>{ inp.focus(); inp.select(); },30); }
    $("#ask").style.display="flex"; });
}
function _askDone(v){ $("#ask").style.display="none"; const r=_askResolve; _askResolve=null; if(r) r(v); }
function askOk(){ _askDone(_askInput ? $("#askinput").value : true); }
function askCancel(){ _askDone(_askInput ? null : false); }
function confirmDialog(message){ return _openAsk(message,false).then(v=>v===true); }
function promptDialog(message, def){ return _openAsk(message,true,def); }

async function api(method, path, body){
  const r = await fetch("/api/v1"+path, {method, credentials:"same-origin",
    headers: body?{"Content-Type":"application/json"}:{}, body: body?JSON.stringify(body):undefined});
  if(r.status===401){ $("#login").style.display="flex"; throw new Error("auth"); }
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.detail||("HTTP "+r.status));
  return data;
}
async function doLogin(ev){ ev.preventDefault();
  try { await api("POST","/auth/login",{email:$("#email").value,password:$("#password").value});
        $("#login").style.display="none"; refresh();
  } catch(e){ $("#loginerr").textContent="Sign-in failed - check credentials."; }
  return false;
}

// Read a provenance-tagged canonical field's value / source by dotted path.
function cf(obj, path){ let n=(obj&&obj.canonical)||{}; for(const p of path.split(".")) n=(n||{})[p]; return n?n.value:null; }
const rid = (o)=>o.internal.id;
// a tool-table entry's human label: its observed description, else the ";comment" parsed
// from a linuxcnc raw line (so entries synced before description flowed still show it).
function entryName(s){
  const d=cf(s,"description"); if(d) return d;
  const data=((s.clients||{}).linuxcnc||{}).data; const raw=data&&data.raw;
  if(raw){ const i=raw.indexOf(";"); if(i>=0) return raw.slice(i+1).trim()||null; }
  return null;
}

async function refresh(){
  try {
    const [inbox, tools, sets, machines, audit, catalog] = await Promise.all([
      api("GET","/instance-inbox"), api("GET","/tool-instance-records"),
      api("GET","/tool-set-records"), api("GET","/machine-records"),
      api("GET","/audit-logs?limit=50"), api("GET","/tool-catalog-records")]);
    state.inbox=inbox.items; state.tools=tools.items; state.toolsets=sets.items;
    state.machines=machines.items; state.audit=audit.logs||[]; state.catalogs=catalog.items;
    state.machineNames=Object.fromEntries(machines.items.map(m=>[rid(m), cf(m,"name")||rid(m).slice(0,8)]));
    state.toolNames=Object.fromEntries(tools.items.map(t=>[rid(t), cf(t,"name")||rid(t).slice(0,8)]));
    state.proposalByEntry=Object.fromEntries(inbox.items.map(p=>[p.entry.id, p]));
    const tables = await Promise.all(machines.items.map(m =>
      api("GET", "/tool-table-entry-records?machine_id="+rid(m)).then(t=>[rid(m),t.items]).catch(()=>[rid(m),[]])));
    state.entriesByMachine=Object.fromEntries(tables);
    state.entriesById={}; for(const entries of Object.values(state.entriesByMachine)) for(const s of entries) state.entriesById[rid(s)]=s;
    render();
  } catch(e){ if(e.message!=="auth") toast("Load failed: "+e.message); }
}

function unboundEntries(){
  const out=[];
  for(const m of state.machines) for(const s of (state.entriesByMachine[rid(m)]||[]))
    if(cf(s,"bound_instance_id")==null) out.push({entry:s, machine:m});
  return out;
}
// "Pending review": unbound entries the server has a proposed match for, awaiting
// a Same tool / Different decision. (Unbound entries with no guess just bind new.)
function hasProposal(entry){
  const p=state.proposalByEntry[rid(entry)];
  return !!(p && p.proposed_instance && p.proposed_instance.id);
}
function pendingEntries(){ return unboundEntries().filter(({entry})=>hasProposal(entry)); }
function togglePending(){ state.pendingOnly=!state.pendingOnly; render(); }

function render(){
  const pending = pendingEntries().length;
  $("#tabs").innerHTML = TABS.map(([id,label])=>
    `<button class="${state.tab===id?"active":""}" onclick="setTab('${id}')">${label}`+
    (id==="machines"&&pending?`<span class="n">${pending}</span>`:"")+`</button>`).join("");
  $("#view").innerHTML = {tools:renderTools,toolsets:renderToolSets,machines:renderMachines,catalog:renderCatalog,audit:renderAudit}[state.tab]();
}
function setTab(t){ state.tab=t; state.catalogSel=null; state.setSel=null; render(); refresh(); }

function showSchema(title,obj){ $("#detailtitle").textContent=title; $("#detailbody").textContent=JSON.stringify(obj,null,2); $("#detail").style.display="flex"; }
function closeDetail(){ $("#detail").style.display="none"; }
// Every id shown in the UI is a link to its record's schema JSON. One resolver
// serves all item types: it finds the loaded record across every collection and
// titles the sheet by kind. No per-type "schema" buttons.
function showById(id){
  for(const [label,coll] of [["Tool instance",state.tools],["Tool set",state.toolsets],
                             ["Machine",state.machines],["Catalog record",state.catalogs]]){
    const r=(coll||[]).find(x=>rid(x)===id);
    if(r){ showSchema(label+" · "+(cf(r,"name")||(""+id).slice(0,8)), r); return; }
  }
  const e=state.entriesById&&state.entriesById[id];
  if(e){ showSchema("Entry · T"+cf(e,"tool_number"), e); return; }
  toast("That record isn't loaded in this view.");
}
// Render a record id as a clickable schema link. n = chars to show (default 8;
// pass 0 for the full id).
function idLink(id,n){ const s=(id==null?"":String(id)); const short=(n===0?s:s.slice(0,n||8));
  return `<a class="id link" title="${esc(s)}" onclick="showById('${esc(s)}')">${esc(short)}</a>`; }

// ---- Binding lives on the Machines tab (proposals folded in) ----------------
async function confirmProp(id){ try{ await api("POST","/instance-inbox/"+id+"/confirm"); toast("Bound. Nothing overwritten."); refresh(); }catch(e){ toast(e.message); } }
async function rejectProp(id){ try{ await api("POST","/instance-inbox/"+id+"/reject"); toast("Dismissed - won't be suggested again."); refresh(); }catch(e){ toast(e.message); } }
async function bindNew(entryId){ const s=state.entriesById[entryId], name=s?entryName(s):null;
  // Mint+bind a new instance from this entry: /bind with no instance_id in the body.
  try{ await api("POST","/tool-table-entry-records/"+entryId+"/bind", name?{name}:{});
       toast(name?`Bound a new tool "${name}".`:"Bound a new tool from the entry."); refresh(); }catch(e){ toast(e.message); } }
async function unbindEntry(entryId){ if(!(await confirmDialog("Unbind this entry? The instance stays; only the binding clears."))) return;
  try{ await api("POST","/tool-table-entry-records/"+entryId+"/unbind"); toast("Unbound."); refresh(); }catch(e){ toast(e.message); } }

// ---- delete (human admin actions; provenance human@web) --------------------
async function deleteRecord(id){ const t=state.tools.find(x=>rid(x)===id);
  if(!(await confirmDialog(`Delete tool "${cf(t,"name")||id.slice(0,8)}"? Any entry holding it is unbound (its data stays).`))) return;
  try{ await api("DELETE","/tool-instance-records/"+id); toast("Deleted tool."); refresh(); }catch(e){ toast(e.message); } }
async function deleteMachine(id){
  if(!(await confirmDialog(`Delete machine "${state.machineNames[id]}" and its tool table? Tool instances stay.`))) return;
  try{ const r=await api("DELETE","/machine-records/"+id); toast(`Deleted machine (${r.entries_removed} entr${r.entries_removed===1?"y":"ies"}).`); refresh(); }catch(e){ toast(e.message); } }
async function deleteEntry(id){
  if(!(await confirmDialog("Remove this reported entry? If the controller pushes it again, it returns."))) return;
  try{ await api("DELETE","/tool-table-entry-records/"+id); toast("Removed entry."); refresh(); }catch(e){ toast(e.message); } }
async function deleteSet(id){ const s=state.toolsets.find(x=>rid(x)===id);
  if(!(await confirmDialog(`Delete tool set "${cf(s,"name")||id.slice(0,8)}"? The tools are not deleted.`))) return;
  try{ await api("DELETE","/tool-set-records/"+id); if(state.setSel===id) state.setSel=null; toast("Deleted set."); refresh(); }catch(e){ toast(e.message); } }

// ---- tool set from a machine (orchestrates existing canonical doors) --------
function _boundInstances(machineId){
  return [...new Set((state.entriesByMachine[machineId]||[]).map(s=>cf(s,"bound_instance_id")).filter(Boolean))];
}
async function createSetFromMachine(machineId){
  const mname=state.machineNames[machineId], ids=_boundInstances(machineId);
  if(!ids.length){ toast("No bound tools on this machine yet - bind/confirm some first."); return; }
  const name=await promptDialog(`New tool set from ${mname} (${ids.length} bound tool(s)):`, mname);
  if(name===null) return; if(!name.trim()){ toast("A name is required."); return; }
  try{
    const sid=(await api("POST","/tool-set-records",{})).internal.id;   // no client section: the web UI isn't a data client
    await api("POST","/tool-set-records/"+sid+"/assert",{path:"name",value:name.trim(),actor:"human@web"});
    await api("POST","/tool-set-records/"+sid+"/assert",{path:"machine_id",value:machineId,actor:"human@web"});
    await api("POST","/tool-set-records/"+sid+"/members",{actor:"human@web",members:ids.map(id=>({tool_record_id:id}))});
    toast(`Created "${name.trim()}" from ${mname} (${ids.length} tool(s)).`);
    state.tab="toolsets"; refresh();
  }catch(e){ toast(e.message); }
}
async function refreshSet(setId){
  const s=state.toolsets.find(x=>rid(x)===setId), machineId=cf(s,"machine_id");
  if(!machineId){ toast("This set isn't linked to a machine."); return; }
  const ids=_boundInstances(machineId);
  try{
    await api("POST","/tool-set-records/"+setId+"/members",{actor:"human@web",members:ids.map(id=>({tool_record_id:id}))});
    toast(`Refreshed from ${state.machineNames[machineId]||"machine"}: ${ids.length} tool(s).`); refresh();
  }catch(e){ toast(e.message); }
}
// A suggested name for an instance: its own name, else the label of an entry it's bound in.
function instanceNameHint(id){
  const t=state.tools.find(x=>rid(x)===id); const own=t&&cf(t,"name"); if(own) return own;
  for(const s of Object.values(state.entriesById)) if(cf(s,"bound_instance_id")===id){ const sn=entryName(s); if(sn) return sn; }
  return "";
}
// Name a tool instance (a human assertion); pre-fills a suggestion.
async function setName(id){
  const name=await promptDialog("Tool name:", instanceNameHint(id));
  if(name===null) return; if(!name.trim()){ toast("Name can't be empty."); return; }
  try{ await api("POST","/tool-instance-records/"+id+"/assert",{path:"name",value:name.trim(),actor:"human@web"}); toast("Named."); refresh(); }catch(e){ toast(e.message); } }

// ---- Tools (instances) -----------------------------------------------------
function renderTools(){
  if(!state.tools.length) return `<div class="empty">No tool instances yet.<br><span class="muted">They appear as machines report tools and you bind them, or as clients sync.</span></div>`;
  const boundAt={};
  for(const m of state.machines) for(const s of (state.entriesByMachine[rid(m)]||[])){
    const b=cf(s,"bound_instance_id"); if(b)(boundAt[b]=boundAt[b]||[]).push({m,n:cf(s,"tool_number")}); }
  return state.tools.map(t=>{
    const dia=cf(t,"geometry.diameter"), shape=cf(t,"geometry.shape"), where=(boundAt[rid(t)]||[]);
    return `<div class="card">
      <div class="row"><strong>${esc(cf(t,"name")||"(unnamed)")}</strong>
        <span>${idLink(rid(t))}
          <button class="mini link" onclick="setName('${rid(t)}')">${cf(t,"name")?"Rename":"Set name"}</button></span></div>
      <div class="muted">${shape?esc(shape):"<i>type unknown</i>"}${dia!=null?" &middot; &#x2300;"+dia:""}</div>`+
      where.map(w=>`<div class="row" style="margin-top:.4rem"><span><span class="pill bound">bound</span> T${w.n} @ ${esc(state.machineNames[rid(w.m)])}</span></div>`).join("")+
      `<div class="row" style="margin-top:.6rem"><span class="muted">${where.length} binding(s)</span>
        <button class="unbind" onclick="deleteRecord('${rid(t)}')">Delete tool</button></div>`+
    `</div>`;
  }).join("");
}

// ---- Tool Sets -------------------------------------------------------------
function openSet(id){ state.tab="toolsets"; state.setSel=id; render(); }
function backToToolSets(){ state.setSel=null; render(); }
async function removeMember(setId, toolId){
  const s=state.toolsets.find(x=>rid(x)===setId); if(!s) return;
  const tname=state.toolNames[toolId]||toolId.slice(0,8);
  if(!(await confirmDialog(`Remove "${tname}" from "${cf(s,"name")||setId.slice(0,8)}"? The tool itself isn't deleted.`))) return;
  // Read-modify-write over the replace-only members door (the same move as
  // `loobric remove-from-set`): keep every other member and its number, drop this one.
  const members=(s.canonical.members||[])
    .filter(m=>m.tool_record_id!==toolId)
    .map(m=>({tool_record_id:m.tool_record_id, number:(m.number||{}).value}));
  try{ await api("POST","/tool-set-records/"+setId+"/members",{members, actor:"human@web"}); toast("Removed from set."); refresh(); }
  catch(e){ toast(e.message); }
}

function renderToolSets(){
  if(state.setSel) return renderToolSetDetail();
  if(!state.toolsets.length) return `<div class="empty">No tool sets yet.</div>`;
  return state.toolsets.map(s=>{
    const machine=cf(s,"machine_id"), members=(s.canonical.members||[]);
    return `<div class="card">
      <div class="row"><strong class="link-ish" onclick="openSet('${rid(s)}')">${esc(cf(s,"name")||"(unnamed)")}</strong>
        <span>${idLink(rid(s))}</span></div>
      <div class="muted">${members.length} tool(s)${machine?" &middot; linked to "+esc(state.machineNames[machine]||machine.slice(0,8)):" &middot; not linked to a machine"}</div>
      <div class="row" style="margin-top:.6rem"><span class="rowact">
        ${machine?`<button class="mini link" onclick="refreshSet('${rid(s)}')">Refresh from machine</button>`:""}
        <button class="unbind" onclick="deleteSet('${rid(s)}')">Delete</button></span></div>
    </div>`;
  }).join("");
}
function renderToolSetDetail(){
  const s=state.toolsets.find(x=>rid(x)===state.setSel);
  if(!s) return `<div class="empty">Tool set not found.<br><span class="link-ish" onclick="backToToolSets()">Back to tool sets</span></div>`;
  const machine=cf(s,"machine_id");
  const members=(s.canonical.members||[]).slice()
    .sort((a,b)=>(((a.number||{}).value)??1e9)-(((b.number||{}).value)??1e9));
  const rows = members.length ? members.map(m=>{
    const tid=m.tool_record_id, num=m.number||{};
    const t=state.tools.find(x=>rid(x)===tid);
    const tname=t?(cf(t,"name")||tid.slice(0,8)):(state.toolNames[tid]||tid.slice(0,8));
    const dia=t?cf(t,"geometry.diameter"):null, shape=t?cf(t,"geometry.shape"):null;
    const numDisp=num.value!=null?`T${num.value}`:`<span class="unknownval">no #</span>`;
    return `<div class="frow">
      <span class="flabel">${numDisp} ${provBadge(num.source||"unknown")}</span>
      <span class="fval"><strong>${esc(tname)}</strong>${shape?` <span class="muted">${esc(shape)}</span>`:""}${dia!=null?` <span class="muted">&#x2300;${dia}</span>`:""} ${idLink(tid)}</span>
      <button class="mini del" onclick="removeMember('${rid(s)}','${tid}')">Remove</button>
    </div>`;
  }).join("") : `<div class="muted" style="padding:.45rem 0">No tools in this set yet &mdash; add them with <code>loobric add-to-set</code>.</div>`;
  return `<div class="row" style="margin-bottom:.6rem">
      <button class="mini link" onclick="backToToolSets()">&#x2190; Back to tool sets</button>
      <span class="rowact">
        ${machine?`<button class="mini link" onclick="refreshSet('${rid(s)}')">Refresh from machine</button>`:""}
        <button class="unbind" onclick="deleteSet('${rid(s)}')">Delete</button></span></div>
    <div class="card">
      <div class="row"><strong>${esc(cf(s,"name")||"(unnamed)")}</strong>${idLink(rid(s),0)}</div>
      <div class="muted" style="margin-top:.3rem">${members.length} tool(s)${machine?" &middot; linked to "+esc(state.machineNames[machine]||machine.slice(0,8))+" &middot; member numbers inherited from its tool table":" &middot; not linked to a machine"}</div>
      <div class="explain" style="margin-top:.6rem">Each member shows its tool number and the <b>source</b> that vouches for it &mdash; ${provBadge("asserted")} declared, ${provBadge("observed")} inherited from a machine, ${provBadge("unknown")} no number yet.</div>
      <div class="section-h">Members</div>${rows}
    </div>`;
}

// ---- Machines (+ tool tables) ----------------------------------------------
function renderMachines(){
  if(!state.machines.length) return `<div class="empty">No machines yet.<br><span class="muted">They register on first sync from a controller.</span></div>`;
  const pending = pendingEntries().length;
  const banner = pending
    ? `<div class="explain">&#x26A0; <b>${pending}</b> tool-table entr${pending===1?"y has":"ies have"} a proposed tool awaiting your decision &mdash; <b>Same tool</b> binds the server's guess, <b>Different</b> rejects it, <b>Bind new</b> mints a fresh instance. <label style="margin-left:.5rem;white-space:nowrap"><input type="checkbox" ${state.pendingOnly?"checked":""} onclick="togglePending()"> only pending review</label></div>`
    : (state.pendingOnly ? `<div class="explain">Nothing pending review. <label style="margin-left:.5rem"><input type="checkbox" checked onclick="togglePending()"> only pending review</label></div>` : "");
  const cards = state.machines.map(m=>{
    let entries=(state.entriesByMachine[rid(m)]||[]).slice().sort((a,b)=>(cf(a,"tool_number")||0)-(cf(b,"tool_number")||0));
    if(state.pendingOnly) entries=entries.filter(s=>hasProposal(s));
    if(state.pendingOnly && !entries.length) return "";
    const body = entries.length ? entries.map(s=>entryRow(m,s)).join("")
      : `<div class="muted">${state.pendingOnly?"nothing pending on this machine":"empty tool table"}</div>`;
    return `<div class="card">
      <div class="row"><strong>${esc(state.machineNames[rid(m)])}</strong>
        <span class="rowact">${idLink(rid(m))}<span class="muted">${esc(cf(m,"controller_type")||"")}</span>
          <button class="mini create" onclick="createSetFromMachine('${rid(m)}')">Create tool set</button>
          <button class="unbind" onclick="deleteMachine('${rid(m)}')">Delete machine</button></span></div>
      ${body}</div>`;
  }).join("");
  return banner + cards;
}
// One row per tool-table entry. Binding lives here (the single binding surface):
// an unbound entry the server proposed a match for offers Same tool / Different /
// Bind new — the SAME options the old Inbox had — so you can confirm the server's
// guess instead of being funnelled into minting a duplicate. An unbound entry
// with no proposed match just offers Bind new.
function entryRow(m,s){
  const bound=cf(s,"bound_instance_id"), dia=cf(s,"offsets.diameter");
  const p = bound ? null : state.proposalByEntry[rid(s)];
  const matched = p && p.proposed_instance && p.proposed_instance.id;
  const guess = matched
    ? `<span class="muted"> &#x2192; same as <b>${esc(p.proposed_instance.name||p.proposed_instance.id.slice(0,8))}</b>${p.proposed_instance.diameter!=null?" &#x2300;"+p.proposed_instance.diameter:""}${typeof p.confidence==="number"?" &middot; "+Math.round(p.confidence*100)+"%":""}</span>`
    : "";
  let actions;
  if(bound){
    actions = `<button class="unbind" onclick="unbindEntry('${rid(s)}')">Unbind</button>`;
  } else if(matched){
    actions = `<button class="mini confirm" onclick="confirmProp('${p.id}')">Same tool</button>`+
              `<button class="mini reject" onclick="rejectProp('${p.id}')">Different</button>`+
              `<button class="mini create" onclick="bindNew('${rid(s)}')">Bind new</button>`;
  } else {
    actions = `<button class="mini create" onclick="bindNew('${rid(s)}')">Bind new</button>`;
  }
  return `<div class="trow">
    <div class="tinfo">
      <span class="tnum link-ish" onclick="showById('${rid(s)}')">T${cf(s,"tool_number")}</span>
      <span>${esc(entryName(s)||"")}</span>
      <span class="muted">${dia!=null?"&#x2300;"+dia:""}</span>
      ${bound?`<span class="pill bound">${esc(state.toolNames[bound]||bound.slice(0,8))}</span>`:`<span class="pill unbound">unbound</span>`}
      ${guess}
    </div>
    <div class="rowact">${actions}
      <button class="mini del" onclick="deleteEntry('${rid(s)}')">Remove</button></div>
  </div>`;
}

// ---- Catalog records (READ-ONLY: the visual drift detector) ----------------
// A ToolCatalogRecord is a nominal, *asserted* published spec. The whole reason
// this surface exists in M2 is provenance visibility: every field is shown next
// to its `source`, so a manufacturer's claim (asserted:…) reads differently from
// a real measurement (observed:…), and an honest gap (unknown) from either.
// No create/edit surface here by design — authoring is CLI-only this slice.
function provBadge(source){
  const src = String(source || "unknown");
  const kind = src.split(":")[0];
  const cls = {asserted:"asserted", observed:"observed", derived:"derived", unknown:"unknown"}[kind] || "unknown";
  return `<span class="prov ${cls}" title="${esc(src)}">${esc(src)}</span>`;
}
// One {value, unit?, source} leaf rendered next to its provenance badge. A null
// value (or an `unknown` source) renders an explicit "unknown" — never a blank
// that could be mistaken for zero/empty.
function catalogField(label, leaf){
  const src = (leaf && leaf.source) || "unknown";
  const kind = String(src).split(":")[0];
  const isUnknown = !leaf || leaf.value == null || kind === "unknown";
  const val = isUnknown
    ? `<span class="unknownval">unknown</span>`
    : esc(leaf.value) + (leaf.unit ? ` <span class="muted">${esc(leaf.unit)}</span>` : "");
  return `<div class="frow"><span class="flabel">${esc(label)}</span>`+
         `<span class="fval">${val}</span>${provBadge(src)}</div>`;
}
function openCatalog(id){ state.tab="catalog"; state.catalogSel=id; render(); }
function backToCatalog(){ state.catalogSel=null; render(); }

function renderCatalog(){
  if(state.catalogSel) return renderCatalogDetail();
  if(!state.catalogs.length) return `<div class="empty">No catalog records yet.<br><span class="muted">Author them with the loobric CLI (create-catalog-record); this surface is read-only.</span></div>`;
  const explain = `<div class="explain">Published catalog specs &mdash; nominal, <b>asserted</b> data. Open one to see every field beside the <b>source</b> that vouches for it, so a manufacturer's claim reads differently from a real measurement.</div>`;
  return explain + state.catalogs.map(c=>{
    const name=cf(c,"name"), mfr=cf(c,"manufacturer"), pc=cf(c,"product_code");
    return `<div class="card">
      <div class="row"><strong class="link-ish" onclick="openCatalog('${rid(c)}')">${esc(name||"(unnamed)")}</strong>
        ${idLink(rid(c))}</div>
      <div class="muted">${mfr?esc(mfr):"<i>manufacturer unknown</i>"}${pc!=null?" &middot; "+esc(pc):""}</div>
      <div class="row" style="margin-top:.6rem"><span class="muted">catalog record</span>
        <span class="rowact">
          <button class="mini create" onclick="openCreateFromCatalog('${rid(c)}')">Create tool from catalog</button>
        </span></div>
    </div>`;
  }).join("");
}
function renderCatalogDetail(){
  const c=state.catalogs.find(x=>rid(x)===state.catalogSel);
  if(!c) return `<div class="empty">Record not found.<br><span class="link-ish" onclick="backToCatalog()">Back to catalog</span></div>`;
  const can=c.canonical||{};
  const idDefs=[["name","Name"],["manufacturer","Manufacturer"],["product_code","Product code"],
                ["item_type","Item type"],["components","Components"]];
  const idRows=idDefs.filter(([k])=>can[k]).map(([k,label])=>catalogField(label,can[k])).join("");
  const geom=can.geometry||{};
  const gKeys=Object.keys(geom);
  const geomRows=gKeys.length
    ? gKeys.map(k=>catalogField(k.replace(/_/g," "), geom[k])).join("")
    : `<div class="muted" style="padding:.45rem 0">No geometry recorded &mdash; honestly sparse, not zero.</div>`;
  const made=instancesFromCatalog(rid(c)).length;
  return `<div class="row" style="margin-bottom:.6rem">
      <button class="mini link" onclick="backToCatalog()">&#x2190; Back to catalog</button>
      <span class="rowact">
        <button class="mini create" onclick="openCreateFromCatalog('${rid(c)}')">Create tool from catalog</button></span></div>
    <div class="card">
      <div class="row"><strong>${esc(cf(c,"name")||"(unnamed)")}</strong>${idLink(rid(c),0)}</div>
      ${made?`<div class="muted" style="margin-top:.3rem">${made} tool${made===1?"":"s"} created from this catalog record.</div>`:""}
      <div class="explain" style="margin-top:.6rem">Each field shows its value and the <b>source</b> that vouches for it:
        ${provBadge("asserted")} a declared / nominal claim &middot;
        ${provBadge("observed")} a real measurement &middot;
        ${provBadge("unknown")} an honest gap (never a guess).</div>
      <div class="section-h">Identity</div>${idRows}
      <div class="section-h">Geometry</div>${geomRows}
    </div>`;
}

// ---- Create tool from catalog (the audited catalog→instance door) ----------
// Browse → this opens a form pre-populated with the catalog's defaults: the name
// is pre-filled and EDITABLE; the nominal geometry is shown READ-ONLY beside its
// provenance badges (what you're creating from). No QA/status fields here — that
// is a deferred future home (M2 form is deliberately thin). Confirm POSTs an
// optional {name} to .../create-instance, which stamps catalog_type_id on a new,
// UNBOUND instance (a catalog is not a machine position).
let _ccFrom = null;   // id of the catalog record the open form is creating from
// How many instances already point back at this catalog record — a client-side
// filter over the already-fetched instances (WHERE catalog_type_id == id), NOT a
// stored back-reference.
function instancesFromCatalog(id){ return state.tools.filter(t=>cf(t,"catalog_type_id")===id); }
function openCreateFromCatalog(id){
  const c=state.catalogs.find(x=>rid(x)===id); if(!c){ toast("Catalog record not found."); return; }
  _ccFrom=id;
  const can=c.canonical||{}, name=cf(c,"name")||"";
  const geom=can.geometry||{}, gKeys=Object.keys(geom);
  const geomRows=gKeys.length
    ? gKeys.map(k=>catalogField(k.replace(/_/g," "), geom[k])).join("")
    : `<div class="muted" style="padding:.45rem 0">No geometry recorded &mdash; honestly sparse, not zero.</div>`;
  const made=instancesFromCatalog(id).length;
  $("#ccbody").innerHTML = `
    <div class="explain" style="margin-top:.6rem">Creating a physical tool from
      <b>${esc(name||"this catalog record")}</b>. The new tool links back to this
      catalog record and is left <b>unbound</b> &mdash; not yet on a machine.</div>
    <label class="cclabel" for="ccname">Name</label>
    <input id="ccname" class="ccinput" value="${esc(name)}" placeholder="tool name"
           onkeydown="if(event.key==='Enter')submitCreateFromCatalog(); else if(event.key==='Escape')closeCreate();">
    <div class="section-h">Nominal geometry (read-only)</div>
    <div class="muted" style="font-size:.82rem;margin-bottom:.2rem">What you're creating from &mdash; the catalog's published spec.</div>
    ${geomRows}
    ${made?`<div class="muted" style="margin-top:.8rem">${made} tool${made===1?"":"s"} already created from this catalog record.</div>`:""}
    <div class="arow">
      <button class="mini reject" onclick="closeCreate()">Cancel</button>
      <button class="mini confirm" onclick="submitCreateFromCatalog()">Create tool</button>
    </div>`;
  $("#ccreate").style.display="flex";
  setTimeout(()=>{ const i=$("#ccname"); if(i){ i.focus(); i.select(); } },30);
}
function closeCreate(){ $("#ccreate").style.display="none"; _ccFrom=null; }
async function submitCreateFromCatalog(){
  if(!_ccFrom) return;
  const id=_ccFrom, name=(($("#ccname")||{}).value||"").trim();
  try{
    const inst=await api("POST","/tool-catalog-records/"+id+"/create-instance", name?{name}:{});
    closeCreate();
    toast(`Created tool "${cf(inst,"name")||rid(inst).slice(0,8)}" — unbound, linked to this catalog record.`);
    refresh();   // re-pull instances so the new tool (and the count) reflect it
  }catch(e){ toast(e.message); }
}

// ---- Audit -----------------------------------------------------------------
function renderAudit(){
  if(!state.audit.length) return `<div class="empty">No audit entries.</div>`;
  return `<div class="card"><table><tr><th>when</th><th>op</th><th>what</th></tr>`+
    state.audit.map(l=>`<tr><td class="muted">${esc((l.timestamp||"").replace("T"," ").slice(0,16))}</td>
      <td>${esc(l.operation)}</td><td>${esc(l.entity_type)} ${idLink(l.entity_id)}</td></tr>`).join("")+
    `</table></div>`;
}

refresh();
setInterval(refresh, 15000);
</script>
