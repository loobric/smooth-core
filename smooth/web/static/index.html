<!DOCTYPE html>
<!--
  Smooth web inbox (smooth-core#6).
  Deliberately one static file: no build step, no dependencies, served by
  the core container. Scope (decision G2 + field feedback): read views for
  tools/machines/audit, plus housekeeping write actions — confirm/reject,
  bind/unbind, create-record, and delete of records/machines/entries.
  Anything richer belongs to Smooth Web (commercial).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smooth</title>
<style>
  :root { --bg:#10151a; --card:#1a222b; --ink:#e8edf2; --dim:#8fa1b3;
          --line:#2a3641; --ok:#3fb46a; --warn:#d9923b; --bad:#cf5b56; --link:#5ab3d6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.45 system-ui,-apple-system,sans-serif; }
  header { display:flex; align-items:center; gap:.75rem; padding:.7rem 1rem;
           background:var(--card); border-bottom:1px solid var(--line);
           position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  header h1 { font-size:1.1rem; margin:0 .5rem 0 0; }
  nav { display:flex; gap:.25rem; flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--dim);
               padding:.5rem .8rem; border-radius:8px; font-size:.95rem; cursor:pointer; }
  nav button.active { color:var(--ink); border-color:var(--line); background:var(--bg); }
  nav button .n { background:var(--warn); color:#000; border-radius:9px;
                  padding:0 .45em; font-size:.8em; margin-left:.3em; }
  main { max-width:760px; margin:0 auto; padding:1rem; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:.9rem 1rem; margin-bottom:.8rem; }
  .muted { color:var(--dim); font-size:.9rem; }
  .row { display:flex; justify-content:space-between; gap:.6rem; align-items:baseline; flex-wrap:wrap; }
  .id { font-family:ui-monospace,monospace; font-size:.8rem; color:var(--dim); }
  .vs { text-align:center; color:var(--dim); margin:.4rem 0; font-size:.9rem; }
  .conf { height:6px; background:var(--line); border-radius:3px; margin:.6rem 0 .3rem; }
  .conf > div { height:100%; border-radius:3px; background:var(--warn); }
  .actions { display:flex; gap:.6rem; margin-top:.7rem; }
  .actions button { flex:1; min-height:46px; border:none; border-radius:10px;
                    font-size:1rem; font-weight:600; cursor:pointer; }
  .confirm { background:var(--ok); color:#06210f; }
  .reject  { background:var(--bad); color:#2b0c0a; }
  .unbind  { background:none; border:1px solid var(--bad) !important; color:var(--bad);
             min-height:36px !important; font-weight:500 !important; flex:0 0 auto !important;
             padding:0 .8rem; }
  .trow { display:flex; justify-content:space-between; gap:.6rem; align-items:center;
          flex-wrap:wrap; padding:.5rem 0; border-top:1px solid var(--line); }
  .trow:first-of-type { border-top:none; }
  .tinfo { display:flex; gap:.5rem; align-items:baseline; flex-wrap:wrap; min-width:0; }
  .tnum { font-weight:600; }
  .rowact { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
  .rowact button { min-height:34px; border:none; border-radius:8px; padding:0 .7rem;
                   font-size:.85rem; font-weight:600; cursor:pointer; }
  button.mini.confirm { background:var(--ok); color:#06210f; }
  button.mini.reject  { background:var(--bad); color:#2b0c0a; }
  button.mini.link    { background:none; border:1px solid var(--link); color:var(--link); }
  button.mini.create  { background:none; border:1px solid var(--ok); color:var(--ok); }
  button.mini.del     { background:none; border:1px solid var(--bad); color:var(--bad); }
  .suggest { font-size:.82rem; margin-right:.2rem; }
  .picker { background:var(--bg); border:1px solid var(--line); color:var(--ink);
            border-radius:8px; padding:.4rem; font-size:.85rem; max-width:50vw; }
  .explain { background:#15202b; border:1px solid var(--line); border-radius:12px;
             padding:.8rem 1rem; margin-bottom:1rem; font-size:.92rem; color:var(--dim); }
  .explain b { color:var(--ink); }
  .empty { text-align:center; color:var(--dim); padding:3rem 1rem; }
  .pill { font-size:.78rem; padding:.1em .55em; border-radius:9px; border:1px solid var(--line); }
  .pill.bound { color:var(--ok); border-color:var(--ok); }
  .pill.unbound { color:var(--dim); }
  .pill.dupe { color:var(--warn); border-color:var(--warn); }
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  td, th { text-align:left; padding:.35rem .4rem; border-top:1px solid var(--line); }
  th { color:var(--dim); font-weight:500; border-top:none; }
  #login { position:fixed; inset:0; background:var(--bg); display:none;
           align-items:center; justify-content:center; z-index:10; }
  #login form { background:var(--card); border:1px solid var(--line); border-radius:14px;
                padding:1.5rem; width:min(92vw,340px); display:flex; flex-direction:column; gap:.7rem; }
  #login input { background:var(--bg); border:1px solid var(--line); color:var(--ink);
                 border-radius:8px; padding:.7rem; font-size:1rem; }
  #login button { min-height:46px; border:none; border-radius:10px; background:var(--link);
                  color:#06212b; font-size:1rem; font-weight:600; cursor:pointer; }
  #login .err { color:var(--bad); font-size:.9rem; min-height:1.2em; }
  #toast { position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
           background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:.6rem 1rem; opacity:0; transition:opacity .25s; max-width:92vw; }
  .spacer { flex:1; }
  #whoami { font-size:.8rem; }
  .link-ish { cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px; }
  #detail { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
            align-items:center; justify-content:center; z-index:9; padding:1rem; }
  #detail .sheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
                   padding:1rem; width:min(96vw,720px); max-height:86vh; display:flex; flex-direction:column; }
  #detail pre { overflow:auto; background:var(--bg); border:1px solid var(--line); border-radius:8px;
                padding:.7rem; font-size:.78rem; line-height:1.4; margin:.6rem 0 0;
                white-space:pre-wrap; word-break:break-word; }
</style>
</head>
<body>

<header>
  <h1>Smooth</h1>
  <nav id="tabs"></nav>
  <span class="spacer"></span>
  <span id="whoami" class="muted"></span>
</header>

<main id="view"></main>

<div id="login"><form onsubmit="return doLogin(event)">
  <strong>Sign in to Smooth</strong>
  <input id="email" type="email" placeholder="email" autocomplete="username" required>
  <input id="password" type="password" placeholder="password" autocomplete="current-password" required>
  <div class="err" id="loginerr"></div>
  <button type="submit">Sign in</button>
</form></div>

<div id="toast"></div>

<div id="detail" onclick="if(event.target.id==='detail')closeDetail()">
  <div class="sheet">
    <div class="row"><strong id="detailtitle"></strong>
      <button class="mini reject" onclick="closeDetail()">Close</button></div>
    <pre id="detailbody"></pre>
  </div>
</div>

<script>
"use strict";
const TABS = [["inbox","Inbox"],["tools","Tools"],["toolsets","Tool Sets"],["machines","Machines"],["audit","Audit"]];
let state = { tab:"inbox", inbox:[], tools:[], toolsets:[], machines:[], audit:[],
              machineNames:{}, toolNames:{}, slotsByMachine:{}, slotsById:{}, proposalBySlot:{} };

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.style.opacity=1; setTimeout(()=>t.style.opacity=0,2600); }

async function api(method, path, body){
  const r = await fetch("/api/v1"+path, {method, credentials:"same-origin",
    headers: body?{"Content-Type":"application/json"}:{}, body: body?JSON.stringify(body):undefined});
  if(r.status===401){ $("#login").style.display="flex"; throw new Error("auth"); }
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.detail||("HTTP "+r.status));
  return data;
}
async function doLogin(ev){ ev.preventDefault();
  try { await api("POST","/auth/login",{email:$("#email").value,password:$("#password").value});
        $("#login").style.display="none"; refresh();
  } catch(e){ $("#loginerr").textContent="Sign-in failed - check credentials."; }
  return false;
}

// Read a provenance-tagged canonical field's value / source by dotted path.
function cf(obj, path){ let n=(obj&&obj.canonical)||{}; for(const p of path.split(".")) n=(n||{})[p]; return n?n.value:null; }
const rid = (o)=>o.internal.id;
// A slot's human label: its observed description, else the ";comment" parsed
// from a linuxcnc raw line (so slots synced before description flowed still show it).
function slotName(s){
  const d=cf(s,"description"); if(d) return d;
  const data=((s.clients||{}).linuxcnc||{}).data; const raw=data&&data.raw;
  if(raw){ const i=raw.indexOf(";"); if(i>=0) return raw.slice(i+1).trim()||null; }
  return null;
}

async function refresh(){
  try {
    const [inbox, tools, sets, machines, audit] = await Promise.all([
      api("GET","/instance-inbox"), api("GET","/tool-instance-records"),
      api("GET","/tool-set-records"), api("GET","/machine-records"),
      api("GET","/audit-logs?limit=50")]);
    state.inbox=inbox.items; state.tools=tools.items; state.toolsets=sets.items;
    state.machines=machines.items; state.audit=audit.logs||[];
    state.machineNames=Object.fromEntries(machines.items.map(m=>[rid(m), cf(m,"name")||rid(m).slice(0,8)]));
    state.toolNames=Object.fromEntries(tools.items.map(t=>[rid(t), cf(t,"name")||rid(t).slice(0,8)]));
    state.proposalBySlot=Object.fromEntries(inbox.items.map(p=>[p.slot.id, p]));
    const tables = await Promise.all(machines.items.map(m =>
      api("GET", "/tool-table-entry-records?machine_id="+rid(m)).then(t=>[rid(m),t.items]).catch(()=>[rid(m),[]])));
    state.slotsByMachine=Object.fromEntries(tables);
    state.slotsById={}; for(const slots of Object.values(state.slotsByMachine)) for(const s of slots) state.slotsById[rid(s)]=s;
    render();
  } catch(e){ if(e.message!=="auth") toast("Load failed: "+e.message); }
}

function unboundSlots(){
  const out=[];
  for(const m of state.machines) for(const s of (state.slotsByMachine[rid(m)]||[]))
    if(cf(s,"bound_instance_id")==null) out.push({slot:s, machine:m});
  return out;
}

function render(){
  const needs = unboundSlots().length;
  $("#tabs").innerHTML = TABS.map(([id,label])=>
    `<button class="${state.tab===id?"active":""}" onclick="setTab('${id}')">${label}`+
    (id==="inbox"&&needs?`<span class="n">${needs}</span>`:"")+`</button>`).join("");
  $("#view").innerHTML = {inbox:renderInbox,tools:renderTools,toolsets:renderToolSets,machines:renderMachines,audit:renderAudit}[state.tab]();
}
function setTab(t){ state.tab=t; render(); refresh(); }

function showSchema(title,obj){ $("#detailtitle").textContent=title; $("#detailbody").textContent=JSON.stringify(obj,null,2); $("#detail").style.display="flex"; }
function closeDetail(){ $("#detail").style.display="none"; }
function showRecord(id){ const t=state.tools.find(x=>rid(x)===id); if(t) showSchema("Tool instance · "+(cf(t,"name")||id.slice(0,8)), t); }
function showSlot(id){ const s=state.slotsById[id]; if(s) showSchema("Slot · T"+cf(s,"tool_number"), s); }
function showSet(id){ const s=state.toolsets.find(x=>rid(x)===id); if(s) showSchema("Tool set · "+(cf(s,"name")||id.slice(0,8)), s); }

// ---- Inbox: unbound slots needing identity ---------------------------------
function renderInbox(){
  const items = unboundSlots();
  if(!items.length) return `<div class="empty">Nothing needs you.<br><span class="muted">Every slot your machines reported is linked to a tool instance.</span></div>`;
  return `<div class="explain">These are <b>slots your machines reported that aren't linked to a tool instance yet</b>. Where the server has a guess, <b>Same tool</b> installs it and <b>Different</b> drops the guess. Otherwise <b>Adopt</b> mints a new instance from the slot's measured diameter.</div>`+
  items.map(({slot,machine})=>{
    const p=state.proposalBySlot[rid(slot)]; const dia=cf(slot,"offsets.diameter");
    return `<div class="card">
      <div class="row"><strong>${esc(state.machineNames[rid(machine)])} · T${cf(slot,"tool_number")}${slotName(slot)?" · "+esc(slotName(slot)):""}</strong>
        <span class="id link-ish" onclick="showSlot('${rid(slot)}')">${esc(rid(slot).slice(0,8))}</span></div>
      <div class="muted">${dia!=null?"&#x2300;"+dia:"no diameter reported"}</div>`+
      (p?`<div class="vs">is this the same tool as <b>${esc(p.proposed_instance.name||p.proposed_instance.id.slice(0,8))}</b>? (&#x2300;${p.proposed_instance.diameter} · ${Math.round(p.confidence*100)}%)</div>
        <div class="rowact" style="margin-top:.6rem">
          <button class="mini confirm" onclick="confirmProp('${p.id}')">Same tool</button>
          <button class="mini reject" onclick="rejectProp('${p.id}')">Different</button>
          <button class="mini create" onclick="adopt('${rid(slot)}')">Adopt new</button></div>`
       :`<div class="rowact" style="margin-top:.6rem">
          <button class="mini create" onclick="adopt('${rid(slot)}')">Adopt as new instance</button></div>`)+
    `</div>`;
  }).join("");
}
async function confirmProp(id){ try{ await api("POST","/instance-inbox/"+id+"/confirm"); toast("Installed. Nothing overwritten."); refresh(); }catch(e){ toast(e.message); } }
async function rejectProp(id){ try{ await api("POST","/instance-inbox/"+id+"/reject"); toast("Dismissed - won't be suggested again."); refresh(); }catch(e){ toast(e.message); } }
async function adopt(slotId){ const s=state.slotsById[slotId], name=s?slotName(s):null;
  try{ await api("POST","/tool-table-entry-records/"+slotId+"/adopt",{actor:"human@web",name:name||undefined});
       toast(name?`Adopted as "${name}".`:"Adopted a new instance from the slot."); refresh(); }catch(e){ toast(e.message); } }
async function unbindSlot(slotId){ if(!window.confirm("Unbind this slot? The instance stays; only the install link clears.")) return;
  try{ await api("POST","/tool-table-entry-records/"+slotId+"/unbind"); toast("Unbound."); refresh(); }catch(e){ toast(e.message); } }

// ---- delete (human admin actions; provenance human@web) --------------------
async function deleteRecord(id){ const t=state.tools.find(x=>rid(x)===id);
  if(!window.confirm(`Delete tool "${cf(t,"name")||id.slice(0,8)}"? Any slot holding it is unbound (its data stays).`)) return;
  try{ await api("DELETE","/tool-instance-records/"+id); toast("Deleted tool."); refresh(); }catch(e){ toast(e.message); } }
async function deleteMachine(id){
  if(!window.confirm(`Delete machine "${state.machineNames[id]}" and its tool table? Tool instances stay.`)) return;
  try{ const r=await api("DELETE","/machine-records/"+id); toast(`Deleted machine (${r.slots_removed} slot(s)).`); refresh(); }catch(e){ toast(e.message); } }
async function deleteSlot(id){
  if(!window.confirm("Remove this reported slot? If the controller pushes it again, it returns.")) return;
  try{ await api("DELETE","/tool-table-entry-records/"+id); toast("Removed slot."); refresh(); }catch(e){ toast(e.message); } }
async function deleteSet(id){ const s=state.toolsets.find(x=>rid(x)===id);
  if(!window.confirm(`Delete tool set "${cf(s,"name")||id.slice(0,8)}"? The tools are not deleted.`)) return;
  try{ await api("DELETE","/tool-set-records/"+id); toast("Deleted set."); refresh(); }catch(e){ toast(e.message); } }

// ---- tool set from a machine (orchestrates existing canonical doors) --------
function _installedInstances(machineId){
  return [...new Set((state.slotsByMachine[machineId]||[]).map(s=>cf(s,"bound_instance_id")).filter(Boolean))];
}
async function createSetFromMachine(machineId){
  const mname=state.machineNames[machineId], ids=_installedInstances(machineId);
  if(!ids.length){ toast("No installed tools on this machine yet - adopt/confirm some first."); return; }
  const name=window.prompt(`New tool set from ${mname} (${ids.length} installed tool(s)):`, mname);
  if(name===null) return; if(!name.trim()){ toast("A name is required."); return; }
  try{
    const sid=(await api("POST","/tool-set-records",{})).internal.id;   // no client section: the web UI isn't a data client
    await api("POST","/tool-set-records/"+sid+"/assert",{path:"name",value:name.trim(),actor:"human@web"});
    await api("POST","/tool-set-records/"+sid+"/assert",{path:"machine_id",value:machineId,actor:"human@web"});
    await api("POST","/tool-set-records/"+sid+"/members",{actor:"human@web",members:ids.map(id=>({tool_record_id:id}))});
    await api("POST","/tool-set-records/"+sid+"/reconcile");            // numbers inherit the machine's slots
    toast(`Created "${name.trim()}" from ${mname} (${ids.length} tool(s)).`);
    state.tab="toolsets"; refresh();
  }catch(e){ toast(e.message); }
}
async function refreshSet(setId){
  const s=state.toolsets.find(x=>rid(x)===setId), machineId=cf(s,"machine_id");
  if(!machineId){ toast("This set isn't linked to a machine."); return; }
  const ids=_installedInstances(machineId);
  try{
    await api("POST","/tool-set-records/"+setId+"/members",{actor:"human@web",members:ids.map(id=>({tool_record_id:id}))});
    await api("POST","/tool-set-records/"+setId+"/reconcile");
    toast(`Refreshed from ${state.machineNames[machineId]||"machine"}: ${ids.length} tool(s).`); refresh();
  }catch(e){ toast(e.message); }
}
// A suggested name for an instance: its own name, else the label of a slot it's installed in.
function instanceNameHint(id){
  const t=state.tools.find(x=>rid(x)===id); const own=t&&cf(t,"name"); if(own) return own;
  for(const s of Object.values(state.slotsById)) if(cf(s,"bound_instance_id")===id){ const sn=slotName(s); if(sn) return sn; }
  return "";
}
// Name a tool instance (a human assertion); pre-fills a suggestion.
async function setName(id){
  const name=window.prompt("Tool name:", instanceNameHint(id));
  if(name===null) return; if(!name.trim()){ toast("Name can't be empty."); return; }
  try{ await api("POST","/tool-instance-records/"+id+"/assert",{path:"name",value:name.trim(),actor:"human@web"}); toast("Named."); refresh(); }catch(e){ toast(e.message); } }

// ---- Tools (instances) -----------------------------------------------------
function renderTools(){
  if(!state.tools.length) return `<div class="empty">No tool instances yet.<br><span class="muted">They appear as machines report tools and you adopt them, or as clients sync.</span></div>`;
  const installedAt={};
  for(const m of state.machines) for(const s of (state.slotsByMachine[rid(m)]||[])){
    const b=cf(s,"bound_instance_id"); if(b)(installedAt[b]=installedAt[b]||[]).push({m,n:cf(s,"tool_number")}); }
  return state.tools.map(t=>{
    const dia=cf(t,"geometry.diameter"), shape=cf(t,"geometry.shape"), where=(installedAt[rid(t)]||[]);
    return `<div class="card">
      <div class="row"><strong class="link-ish" onclick="showRecord('${rid(t)}')">${esc(cf(t,"name")||"(unnamed)")}</strong>
        <span><span class="id">${esc(rid(t).slice(0,8))}</span>
          <button class="mini link" onclick="setName('${rid(t)}')">${cf(t,"name")?"Rename":"Set name"}</button>
          <button class="mini link" onclick="showRecord('${rid(t)}')">schema</button></span></div>
      <div class="muted">${shape?esc(shape):"<i>type unknown</i>"}${dia!=null?" &middot; &#x2300;"+dia:""}</div>`+
      where.map(w=>`<div class="row" style="margin-top:.4rem"><span><span class="pill bound">installed</span> T${w.n} @ ${esc(state.machineNames[rid(w.m)])}</span></div>`).join("")+
      `<div class="row" style="margin-top:.6rem"><span class="muted">${where.length} install(s)</span>
        <button class="unbind" onclick="deleteRecord('${rid(t)}')">Delete tool</button></div>`+
    `</div>`;
  }).join("");
}

// ---- Tool Sets -------------------------------------------------------------
function renderToolSets(){
  if(!state.toolsets.length) return `<div class="empty">No tool sets yet.</div>`;
  return state.toolsets.map(s=>{
    const machine=cf(s,"machine_id"), members=(s.canonical.members||[]);
    return `<div class="card">
      <div class="row"><strong class="link-ish" onclick="showSet('${rid(s)}')">${esc(cf(s,"name")||"(unnamed)")}</strong>
        <span><span class="id">${esc(rid(s).slice(0,8))}</span> <button class="mini link" onclick="showSet('${rid(s)}')">schema</button></span></div>
      <div class="muted">${members.length} tool(s)${machine?" &middot; linked to "+esc(state.machineNames[machine]||machine.slice(0,8)):""}</div>
      <div class="row" style="margin-top:.6rem"><span class="rowact">
        ${machine?`<button class="mini link" onclick="refreshSet('${rid(s)}')">Refresh from machine</button>`:""}
        <button class="unbind" onclick="deleteSet('${rid(s)}')">Delete</button></span></div>
    </div>`;
  }).join("");
}

// ---- Machines (+ tool tables) ----------------------------------------------
function renderMachines(){
  if(!state.machines.length) return `<div class="empty">No machines yet.<br><span class="muted">They register on first sync from a controller.</span></div>`;
  return state.machines.map(m=>{
    const slots=(state.slotsByMachine[rid(m)]||[]).slice().sort((a,b)=>(cf(a,"tool_number")||0)-(cf(b,"tool_number")||0));
    const body = slots.length ? slots.map(s=>slotRow(m,s)).join("") : `<div class="muted">empty tool table</div>`;
    return `<div class="card">
      <div class="row"><strong>${esc(state.machineNames[rid(m)])}</strong>
        <span class="rowact"><span class="muted">${esc(cf(m,"controller_type")||"")}</span>
          <button class="mini create" onclick="createSetFromMachine('${rid(m)}')">Create tool set</button>
          <button class="unbind" onclick="deleteMachine('${rid(m)}')">Delete machine</button></span></div>
      ${body}</div>`;
  }).join("");
}
function slotRow(m,s){
  const bound=cf(s,"bound_instance_id"), dia=cf(s,"offsets.diameter");
  return `<div class="trow">
    <div class="tinfo">
      <span class="tnum link-ish" onclick="showSlot('${rid(s)}')">T${cf(s,"tool_number")}</span>
      <span>${esc(slotName(s)||"")}</span>
      <span class="muted">${dia!=null?"&#x2300;"+dia:""}</span>
      ${bound?`<span class="pill bound">${esc(state.toolNames[bound]||bound.slice(0,8))}</span>`:`<span class="pill unbound">unbound</span>`}
    </div>
    <div class="rowact">${bound
      ?`<button class="unbind" onclick="unbindSlot('${rid(s)}')">Unbind</button>`
      :`<button class="mini create" onclick="adopt('${rid(s)}')">Adopt</button>`}
      <button class="mini del" onclick="deleteSlot('${rid(s)}')">Remove</button></div>
  </div>`;
}

// ---- Audit -----------------------------------------------------------------
function renderAudit(){
  if(!state.audit.length) return `<div class="empty">No audit entries.</div>`;
  return `<div class="card"><table><tr><th>when</th><th>op</th><th>what</th></tr>`+
    state.audit.map(l=>`<tr><td class="muted">${esc((l.timestamp||"").replace("T"," ").slice(0,16))}</td>
      <td>${esc(l.operation)}</td><td>${esc(l.entity_type)} <span class="id">${esc((l.entity_id||"").slice(0,8))}</span></td></tr>`).join("")+
    `</table></div>`;
}

refresh();
setInterval(refresh, 15000);
</script>
