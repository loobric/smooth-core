name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Restrict the default token; the job grants itself exactly what it needs.
permissions: {}

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    permissions:
      actions: write          # cancel/re-run the workflow on signature
      contents: write          # store signatures on the cla-signatures branch
      pull-requests: write     # comment on / label the PR
      statuses: write          # set the CLA commit status
    steps:
      - name: "CLA Assistant"
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: cla-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Signatures are stored in this repo on a dedicated branch.
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/loobric/smooth-core/blob/master/docs/CLA.md'
          branch: 'cla-signatures'

          # Must match docs/CLA.md §6 exactly.
          custom-notsigned-prcomment: >-
            Thank you for your contribution to Smooth Core. Before we can merge,
            we need you to sign the [Contributor License Agreement](https://github.com/loobric/smooth-core/blob/master/docs/CLA.md).
            Please read it, then post a comment below with the exact text:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'

          # Maintainer and bots are exempt.
          allowlist: 'sliptonic,*[bot]'
